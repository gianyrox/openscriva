name: secret-scan
on: [push, pull_request]
permissions:
  contents: read
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Local pattern scanner
        run: |
          if [ -f scripts/check-secrets.sh ]; then
            bash scripts/check-secrets.sh --ci
          else
            echo "::error::scripts/check-secrets.sh missing — required by OPENSOURCE_POLICY.md §5.1"
            exit 1
          fi
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
